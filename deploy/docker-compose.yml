version: '3.8'

networks:
  devopsagent-network:
    driver: bridge
    name: ${DOCKER_NETWORK:-devopsagent-network}

volumes:
  jenkins-home:
    name: ${COMPOSE_PROJECT_NAME:-devopsagent}_jenkins-home
    driver: local
  agent-data:
    name: ${COMPOSE_PROJECT_NAME:-devopsagent}_agent-data
    driver: local
  gitlab-config:
    name: ${COMPOSE_PROJECT_NAME:-devopsagent}_gitlab-config
    driver: local
  gitlab-logs:
    name: ${COMPOSE_PROJECT_NAME:-devopsagent}_gitlab-logs
    driver: local
  gitlab-data:
    name: ${COMPOSE_PROJECT_NAME:-devopsagent}_gitlab-data
    driver: local
  nginx-logs:
    name: ${COMPOSE_PROJECT_NAME:-devopsagent}_nginx-logs
    driver: local
  mantisbt-web:
    name: ${COMPOSE_PROJECT_NAME:-devopsagent}_mantisbt-web
    driver: local
  mantisbt-db-data:
    name: ${COMPOSE_PROJECT_NAME:-devopsagent}_mantisbt-db-data
    driver: local

services:
  agent:
    image: ${AGENT_IMAGE:-ghcr.io/agent/agent:latest}
    container_name: ${AGENT_CONTAINER_NAME:-devopsagent-agent}
    restart: unless-stopped
    user: "1000:1000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    networks:
      - devopsagent-network
    ports:
      - "${AGENT_BIND:-127.0.0.1}:${AGENT_PORT:-18789}:18789"
    volumes:
      - agent-data:/home/node/.agent
    environment:
      - AGENT_GATEWAY_TOKEN=${AGENT_GATEWAY_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    command: >
      node agent.mjs gateway --allow-unconfigured
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:18789/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "devopsagent.service=agent"
      - "devopsagent.version=4.1.0"
      - "devopsagent.expose_port=${NGINX_ENABLED:-false}"

  jenkins:
    image: ${JENKINS_IMAGE:-jenkins/jenkins:lts-jdk21}
    container_name: ${JENKINS_CONTAINER_NAME:-devopsagent-jenkins}
    restart: unless-stopped
    user: root
    networks:
      - devopsagent-network
    ports:
      - "${JENKINS_BIND:-127.0.0.1}:${JENKINS_PORT_WEB:-18081}:8080"
      - "${JENKINS_BIND:-127.0.0.1}:${JENKINS_PORT_AGENT:-50000}:50000"
    volumes:
      - jenkins-home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./jjb-configs:/var/jenkins_home/jjb-configs:ro
    environment:
      - JENKINS_OPTS=--prefix=/jenkins
      - JAVA_OPTS=${JENKINS_JAVA_OPTS:--Xmx2g -Xms512m}
      - JENKINS_URL=${JENKINS_URL:-http://127.0.0.1:8081/jenkins}
      - AGENT_HOST=${AGENT_CONTAINER_NAME:-devopsagent-agent}
      - AGENT_PORT=18789
      - DEFAULT_MODEL=${DEFAULT_MODEL:-deepseek-reasoner}
      - MAX_RETRY=${MAX_RETRY:-5}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:8080/jenkins/login" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    depends_on:
      - agent
    labels:
      - "devopsagent.service=jenkins"
      - "devopsagent.version=4.1.0"
      - "devopsagent.expose_port=${NGINX_ENABLED:-false}"

  gitlab:
    image: ${GITLAB_IMAGE:-gitlab/gitlab-ce:latest}
    container_name: ${GITLAB_CONTAINER_NAME:-devopsagent-gitlab}
    restart: unless-stopped
    hostname: ${GITLAB_HOSTNAME:-gitlab.devopsagent.local}
    networks:
      - devopsagent-network
    ports:
      - "${GITLAB_BIND:-127.0.0.1}:${GITLAB_PORT_HTTP:-19092}:80"
      - "${GITLAB_BIND:-127.0.0.1}:${GITLAB_PORT_HTTPS:-19443}:443"
      - "${GITLAB_BIND:-127.0.0.1}:${GITLAB_PORT_SSH:-2222}:22"
    volumes:
      - gitlab-config:/etc/gitlab
      - gitlab-logs:/var/log/gitlab
      - gitlab-data:/var/opt/gitlab
    shm_size: ${GITLAB_SHM_SIZE:-512m}
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://${GITLAB_HOSTNAME:-gitlab.devopsagent.local}';
        gitlab_rails['gitlab_shell_ssh_port'] = ${GITLAB_PORT_SSH:-2222};
        nginx['listen_port'] = 80;
        nginx['listen_https'] = false;
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:80/-/health" ]
      interval: 60s
      timeout: 10s
      retries: 10
      start_period: 300s
    labels:
      - "devopsagent.service=gitlab"
      - "devopsagent.version=4.1.0"
      - "devopsagent.expose_port=${NGINX_ENABLED:-false}"

  mantisbt-db:
    image: ${MARIADB_IMAGE:-mariadb:10.11}
    container_name: ${MARIADB_CONTAINER_NAME:-devopsagent-mantisbt-db}
    restart: unless-stopped
    networks:
      - devopsagent-network
    ports:
      - "${MANTISBT_BIND:-127.0.0.1}:${MARIADB_PORT:-3307}:3306"
    volumes:
      - mantisbt-db-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MANTISBT_DB_PASSWORD:-mantisbt_secret}
      - MYSQL_DATABASE=${MANTISBT_DB_NAME:-mantisbt}
      - MYSQL_USER=${MANTISBT_DB_USER:-mantisbt}
      - MYSQL_PASSWORD=${MANTISBT_DB_PASSWORD:-mantisbt_secret}
      - TZ=Asia/Shanghai
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MANTISBT_DB_PASSWORD:-mantisbt_secret}", "--silent" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - "devopsagent.service=mantisbt-db"
      - "devopsagent.version=4.1.0"

  mantisbt:
    image: ${MANTISBT_IMAGE:-mantisbt/mantisbt:latest}
    container_name: ${MANTISBT_CONTAINER_NAME:-devopsagent-mantisbt}
    restart: unless-stopped
    networks:
      - devopsagent-network
    ports:
      - "${MANTISBT_BIND:-127.0.0.1}:${MANTISBT_PORT_WEB:-19093}:80"
    volumes:
      - mantisbt-web:/var/www/html
    environment:
      - MANTISBT_DB_HOST=${MARIADB_CONTAINER_NAME:-devopsagent-mantisbt-db}
      - MANTISBT_DB_PORT=3306
      - MANTISBT_DB_NAME=${MANTISBT_DB_NAME:-mantisbt}
      - MANTISBT_DB_USER=root
      - MANTISBT_DB_PASSWORD=${MANTISBT_DB_PASSWORD:-mantisbt_secret}
      - MANTISBT_ADMIN_USER=${MANTISBT_ADMIN_USER:-administrator}
      - MANTISBT_ADMIN_PASSWORD=${MANTISBT_ADMIN_PASSWORD:-root}
      - TZ=Asia/Shanghai
    depends_on:
      - mantisbt-db
    labels:
      - "devopsagent.service=mantisbt"
      - "devopsagent.version=4.1.0"
      - "devopsagent.expose_port=${NGINX_ENABLED:-false}"

  nginx:
    image: ${NGINX_IMAGE:-nginx:alpine}
    container_name: ${NGINX_CONTAINER_NAME:-devopsagent-nginx}
    restart: always
    networks:
      - devopsagent-network
    ports:
      # 默认 HTTPS 端口（转发到 GitLab）
      - "${NGINX_BIND:-127.0.0.1}:443:443"

      # Jenkins HTTPS: 主机 18440 → 容器 8440（Nginx 监听 8440，转发到 jenkins:8080）
      - "${NGINX_BIND:-127.0.0.1}:${NGINX_PORT_JENKINS:-18440}:8440"

      # GitLab HTTPS: 主机 18441 → 容器 8441（Nginx 监听 8441，转发到 gitlab:80）
      - "${NGINX_BIND:-127.0.0.1}:${NGINX_PORT_GITLAB:-18441}:8441"

      # Agent HTTPS: 主机 18442 → 容器 8442（Nginx 监听 8442，转发到 agent:18789）
      - "${NGINX_BIND:-127.0.0.1}:${NGINX_PORT_AGENT:-18442}:8442"

      # MantisBT HTTPS: 主机 18443 → 容器 8443（Nginx 监听 8443，转发到 mantisbt:80）
      - "${NGINX_BIND:-127.0.0.1}:${NGINX_PORT_MANTISBT:-18443}:8443"
      # ============================================
      # 可选服务端口（默认注释，如需启用请取消注释）
      # ============================================
      # 注意: 以下端口与 GitLab 内置端口可能冲突
      # - 8443 与 GitLab HTTPS (127.0.0.1:8443) 冲突
      # - 15672 与 RabbitMQ 管理界面冲突（如果部署了 RabbitMQ）
      #
      # Harbor HTTPS 端口（可选，需修改为不冲突的端口）
      # - "${NGINX_BIND:-127.0.0.1}:${NGINX_PORT_HARBOR:-8446}:8446"
      #
      # Artifactory HTTPS 端口（可选）
      # - "${NGINX_BIND:-127.0.0.1}:${NGINX_PORT_ARTIFACTORY:-8444}:8444"
      #
      # TRM HTTPS 端口（可选）
      # - "${NGINX_BIND:-127.0.0.1}:${NGINX_PORT_TRM:-8445}:8445"
      #
      # RabbitMQ 管理界面 HTTPS 端口（可选）
      # - "${NGINX_BIND:-127.0.0.1}:${NGINX_PORT_RABBITMQ:-15672}:15672"
    volumes:
      - ./deploy_nginx/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy_nginx/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy_nginx/nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    healthcheck:
      test: [ "CMD", "nginx", "-t" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - jenkins
      - gitlab
      - agent
      - mantisbt
    labels:
      - "devopsagent.service=nginx"
      - "devopsagent.version=4.1.0"
      - "devopsagent.role=reverse-proxy"

# Agent v5.0 全局配置
jenkins:
  base_url: "https://127.0.0.1:18440/"
  username: "admin"
  api_token: "REPLACE_WITH_YOUR_JENKINS_API_TOKEN"

ai_model:
  provider: "deepseek"
  model_name: "deepseek-reasoner"
  api_key: "REPLACE_WITH_YOUR_DEEPSEEK_API_KEY"

gitlab:
  base_url: "https://127.0.0.1:18441/"
  api_token: "REPLACE_WITH_YOUR_GITLAB_TOKEN"

git:
  user_name: "root"
  user_email: "user@example.com"
  credential_type: "token"
  token: "REPLACE_WITH_YOUR_GIT_TOKEN"


white_list:
  repos: ["group/backend-api", "group/frontend-app"]
  branch_pattern: "^(feat|fix|dev|auto-test)/.*"